<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Housing Market Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>
<h1>Housing Market Dashboard</h1>
<p>Visualizing Housing Market Trends</p>
</header>

<section class="kpi-container">

<div class="kpi">
<h3>Total Houses</h3>
<p id="houses">21609</p>
</div>

<div class="kpi">
<h3>Average Price</h3>
<p>$511,619</p>
</div>

<div class="kpi">
<h3>Avg Bedrooms</h3>
<p>3.4</p>
</div>

<div class="kpi">
<h3>Avg Bathrooms</h3>
<p>2.3</p>
</div>

</section>

<section class="dashboard-grid">

<div class="chart-card">
<h3>Sale Price Distribution</h3>
<canvas id="priceChart"></canvas>
</div>

<div class="chart-card">
<h3>Renovation Status</h3>
<canvas id="renoChart"></canvas>
</div>

<div class="chart-card">
<h3>House Features</h3>
<canvas id="featureChart"></canvas>
</div>

<div class="chart-card">
<h3>Age vs Price Trend</h3>
<canvas id="trendChart"></canvas>
</div>

</section>

<script src="script.js"></script>

</body>
</html>
